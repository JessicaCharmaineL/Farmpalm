<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE-edge">
    <title>Contact Us</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/nav.css">
    <link rel="stylesheet" href="../css/contact.css">
    <link rel="stylesheet" href="../css/footer.css">

    <script src="../js/nav-loader.js" defer></script>
    <script src="../js/cookie-loader.js" defer></script>
    <script src="../js/footer-loader.js" defer></script>

</head>

<body>
 <!-- Navigation bar -->

<div id="navbar"></div>

<!-- Rest of page -->

<div class="contact-section">

    <div class="contact-heading">
        <p>
            Have a question, partnership enquiry, or need support?
            We'd love to hear from you.
        </p>
    </div>

        <div class="contact-wrapper">

            <!-- Left side-->
            <div class="contact-form-section">

                <form class="contact-form">

                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="Your full name">
                    </div>

                    <div class="form-group">
                        <label>E-mail</label>
                        <input type="email" placeholder="john@example.com">
                    </div>

                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" placeholder="+234 xxx xxx xxxx">
                    </div>

                    <div class="form-group">
                        <label>I am a...</label>

                        <select>
                            <option>Farmer</option>
                            <option>Aggregator</option>
                            <option>Processor</option>
                            <option>Buyer</option>
                        </select>
                    </div>

                    <div class="form-group" >
                        <label>Message</label>
                        <textarea rows="7" placeholder="How can we help you?"></textarea>
                    </div>

                    <button class="contact-btn">
                        Send Message
                    </button>

                </form>

            </div>

            <!-- RIGHT SIDE -->
            <div class="contact-info">

                <div class="info-card">
                    <i class="fa-solid fa-envelope"></i>

                    <h3>Email Us</h3>

                    <p class="main-info">
                        help@farmpalm.africa
                    </p>

                    <p class="small-info">
                        We respond within 24 hours
                    </p>
                </div>

                <div class="info-card">
                    <i class="fa-solid fa-phone"></i>

                    <h3>Call Us</h3>

                    <p class="main-info">
                        +234 800 FARMPALM
                    </p>

                    <p class="small-info">
                        8am – 8pm daily
                    </p>
                </div>

                <div class="info-card">
                    <i class="fa-solid fa-location-dot"></i>

                    <h3>Visit Us</h3>

                    <p class="main-info">
                        Lagos, Nigeria
                    </p>

                    <p class="small-info">
                        Headquarters
                    </p>
                </div>

            </div>

        </div>
</div>

    <!-- Cookie Banner Placeholder -->
    <div id="cookie"></div>

    <!-- Footer Placeholder -->
    <div id="footer"></div>

</body>
</html>
